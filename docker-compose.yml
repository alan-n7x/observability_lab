version: "3.8"

services:
  grafana:
    image: grafana/grafana:latest
    container_name: observability_grafana

    ports:
      # Exposição apenas local (seguro)
      - "127.0.0.1:3000:3000"

    environment:
      # Usuário inicial do Grafana
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin

      # Instala automaticamente o plugin do Zabbix
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app

    volumes:
      # Persistência de dados (dashboards, users, datasources)
      - grafana_data:/var/lib/grafana

    restart: unless-stopped

volumes:
  grafana_data:
